<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyAg0MU5DyasvEAObrczsx-rHoK55KoNK_E",
  authDomain: "anurag-login.firebaseapp.com",
  projectId: "anurag-login",
  storageBucket: "anurag-login.firebasestorage.app",
  messagingSenderId: "672618976630",
  appId: "1:672618976630:web:a5b84420b4daa37cda9657",
  measurementId: "G-NR11DFGNJF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


window.register=function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,pass)
.then(()=>{
alert("Registered Successfully")
})

}


window.login=function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
alert("Login Success")
})

}

</script>

</body>
</html>
